<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presensi Keaktifan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #f0f4f8; 
            padding: 20px 12px;
            display: flex;
            justify-content: center;
        }

        /* Pembungkus Kotak Tengah (Tidak Full Layar) */
        .main-container {
            width: 100%;
            max-width: 550px; 
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid #dcdcdc;
            overflow: hidden;
            padding-bottom: 20px;
        }
        
        /* Header Biru Dongker */
        .dashboard-header { 
            background: #0d5c75; 
            color: white; 
            padding: 24px 20px; 
            text-align: center;
            border-bottom: 4px solid #074356;
        }
        .dashboard-header h1 { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
        .dashboard-header h2 { font-size: 18px; font-weight: 800; margin-bottom: 12px; }
        .dashboard-header .sub-badge {
            background-color: #007bff;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
        
        .content-body { padding: 20px; }
        .section-title { font-size: 15px; font-weight: bold; color: #0d5c75; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .control-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .control-group label { font-size: 13px; font-weight: bold; color: #495057; }
        
        select, input[type="date"] { width: 100%; padding: 11px; font-size: 14px; border-radius: 6px; border: 1px solid #cccccc; background-color: #fff; }
        
        /* Kartu Siswa & Pilihan Status */
        .student-list-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; margin-bottom: 20px; }
        .student-card { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .student-name { font-size: 14px; font-weight: bold; color: #212529; margin-bottom: 8px; }
        
        .status-panel { display: flex; justify-content: space-between; gap: 6px; }
        .status-panel label { flex: 1; text-align: center; font-size: 11px; font-weight: bold; padding: 8px 2px; border-radius: 6px; border: 1px solid #ced4da; cursor: pointer; background: #fff; }
        .status-panel input[type="radio"] { display: none; }
        
        /* Warna Tombol Status Saat Diklik */
        .status-panel label:has(input[value="Aktif"]):hover, .status-panel label:has(input[value="Aktif"]:checked) { background-color: #e2f0d9; border-color: #28a745; color: #28a745; }
        .status-panel label:has(input[value="Kurang Aktif"]):hover, .status-panel label:has(input[value="Kurang Aktif"]:checked) { background-color: #fff3cd; border-color: #ffc107; color: #856404; }
        .status-panel label:has(input[value="Tidak Aktif"]):hover, .status-panel label:has(input[value="Tidak Aktif"]:checked) { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        
        /* Tombol Bawah */
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; text-align: center; text-decoration: none; cursor: pointer; }
        .btn-submit { background-color: #0d5c75; color: white; }
        .btn-back { background-color: #6c757d; color: white; }
        .empty-state { text-align: center; padding: 20px; color: #777; font-size: 13px; background: #f8fafc; border-radius: 8px; border: 1px dashed #ccc; }
    </style>
</head>
<body>
    <div class="main-container">
        
        <!-- Header Identitas -->
        <div class="dashboard-header">
            <h1>SMA NEGERI 15 MALUKU TENGAH</h1>
            <h2>PENDIDIKAN PANCASILA</h2>
            <div class="sub-badge">Presensi Keaktifan</div>
        </div>

        <div class="content-body">
            <div class="section-title">Identitas & Filter Kelas</div>
            
            <div class="control-group">
                <label>Nama Guru</label>
                <input type="text" value="Usep Saepudin, M.Pd" disabled style="background:#f1f5f9; color:#666; padding:11px; border:1px solid #ccc; border-radius:6px; font-size:14px;">
            </div>

            <div class="control-group">
                <label for="classFilter">Pilih Kelas</label>
                <select id="classFilter" onchange="filterSiswa()">
                    <option value="">-- Pilih Kelas --</option>
                </select>
            </div>

            <div class="control-group">
                <label for="dateUpdate">Tanggal Pertemuan</label>
                <input type="date" id="dateUpdate">
            </div>

            <div class="section-title" style="margin-top: 25px;">Daftar Siswa & Status</div>

            <!-- Wadah Siswa Muncul -->
            <div id="studentListContainer" class="student-list-container">
                <div class="empty-state">Silakan pilih kelas terlebih dahulu.</div>
            </div>

            <!-- Tombol Navigasi -->
            <div class="btn-container">
                <a href="admin.html" class="btn btn-back">Kembali</a>
                <button class="btn btn-submit" onclick="kirimData()">Kirim ke Sheet</button>
            </div>
        </div>
    </div>
    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxAoZJQVE3hyF0mAg7iqHcREt5WsoHAAeIG_RrOuJ3C266DGHSVu7flpXRwizBXDtIH/exec"; 
        let dataSiswaGlobal = [];

        window.onload = function() {
            const hariIni = new Date().toISOString().split('T');
            document.getElementById('dateUpdate').value = hariIni;
            muatDataDariSheet();
        };

        function muatDataDariSheet() {
            fetch(`${WEB_APP_URL}?action=read`)
                .then(res => res.json())
                .then(data => {
                    dataSiswaGlobal = data;
                    isiFilterKelas(data);
                })
                .catch(err => console.error("Gagal memuat data:", err));
        }

        function isiFilterKelas(data) {
            const select = document.getElementById("classFilter");
            const kelasUnik = [...new Set(data.map(item => item.kelas))].filter(Boolean);
            kelasUnik.forEach(kelas => {
                let opt = document.createElement("option");
                opt.value = kelas;
                opt.textContent = kelas;
                select.appendChild(opt);
            });
        }

         function filterSiswa() {
            const kelasTerpilih = document.getElementById("classFilter").value;
            const container = document.getElementById("studentListContainer");
            container.innerHTML = "";

            if (!kelasTerpilih) {
                container.innerHTML = `<div class="empty-state">Silakan pilih kelas terlebih dahulu.</div>`;
                return;
            }

            const siswaFiltered = dataSiswaGlobal.filter(item => item.kelas === kelasTerpilih);

            if(siswaFiltered.length === 0) {
                container.innerHTML = `<div class="empty-state">Tidak ada siswa di kelas ini.</div>`;
                return;
            }

            siswaFiltered.forEach((siswa, index) => {
                let card = document.createElement("div");
                card.className = "student-card";
                card.innerHTML = `
                    <div class="student-name">${siswa.nama}</div>
                    <div class="status-panel">
                        <!-- Atribut 'checked' dipindahkan ke pilihan Kurang Aktif -->
                        <label><input type="radio" name="status_${index}" value="Aktif"> Aktif</label>
                        <label><input type="radio" name="status_${index}" value="Kurang Aktif" checked> K. Aktif</label>
                        <label><input type="radio" name="status_${index}" value="Tidak Aktif"> T. Aktif</label>
                        <input type="hidden" id="nama_${index}" value="${siswa.nama}">
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function kirimData() {
            const kelasTerpilih = document.getElementById("classFilter").value;
            const tanggalTerpilih = document.getElementById("dateUpdate").value;

            if (!kelasTerpilih) return alert("Pilih kelas terlebih dahulu!");
            if (!tanggalTerpilih) return alert("Pilih tanggal terlebih dahulu!");

            const [tahun, bulan, hari] = tanggalTerpilih.split('-');
            const tanggalFormat = `${hari}/${bulan}`;

            const container = document.getElementById("studentListContainer");
            const cards = container.getElementsByClassName("student-card");
            let hasilPresensi = [];

            for (let i = 0; i < cards.length; i++) {
                let nama = document.getElementById(`nama_${i}`).value;
                let status = document.querySelector(`input[name="status_${i}"]:checked`).value;
                hasilPresensi.push({ nama: nama, status: status });
            }

            const btnSubmit = document.querySelector('.btn-submit');
            btnSubmit.innerText = "Mengirim...";
            btnSubmit.disabled = true;

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ kelas: kelasTerpilih, tanggal: tanggalFormat, data: hasilPresensi })
            })
            .then(() => {
                alert(`Data kelas ${kelasTerpilih} tanggal ${tanggalFormat} sukses dikirim!`);
                btnSubmit.innerText = "Kirim ke Sheet";
                btnSubmit.disabled = false;
            })
            .catch(err => {
                alert("Gagal mengirim data: " + err);
                btnSubmit.innerText = "Kirim ke Sheet";
                btnSubmit.disabled = false;
            });
        }
    </script>
</body>
</html>
