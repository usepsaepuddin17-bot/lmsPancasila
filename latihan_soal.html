<body>
    <div class="lms-container">
        <!-- BANNER ATAS PERMANEN -->
        <div class="lms-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Coat_of_arms_of_Maluku.png" alt="Logo Propinsi Maluku" class="garuda-logo">
            <h1>MEMASUKI RUANG UJI MATERI</h1>
            <div class="badge-page"> Latihan Soal </div>
        </div>

        <!-- SUB-HALAMAN A: FORMULIR IDENTITAS SISWA -->
        <div id="section-identitas" class="page-section page-active">
            <div class="form-title">Identitas Peserta Didik</div>
            
            <div class="form-group">
                <label for="nisn">NISN / ID Siswa</label>
                <div class="input-btn-group">
                    <input type="number" id="nisn" placeholder="Masukkan ID Siswa...">
                    <button class="btn-cek" id="btn-periksa" onclick="verifikasiIdSiswa()">Cek ID</button>
                </div>
                <span id="siswa-status" class="loading-text" style="color: #cbd5e1;">Silakan masukkan ID lalu klik Cek ID</span>
            </div>

            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Akan terisi otomatis..." readonly style="background-color: #f1f5f9;">
            </div>

            <div class="form-group">
                <label for="kelas">Kelas</label>
                <input type="text" id="kelas" placeholder="Akan terisi otomatis..." readonly style="background-color: #f1f5f9;">
            </div>

            <div class="form-group">
                <label for="pertemuan">Pilih Pertemuan Berdasarkan Judul</label>
                <select id="pertemuan" disabled>
                    <option value="">-- Kunci ID Terlebih Dahulu --</option>
                </select>
                <span id="loading-status" class="loading-text">Menunggu verifikasi identitas siswa...</span>
            </div>

            <div class="btn-container">
                <a href="index.html" class="btn btn-back">Kembali ke Beranda</a>
                <button class="btn btn-submit" id="btn-lanjut" onclick="ambilSoalDariDoc()" disabled>Mulai Ujian</button>
            </div>
        </div>

        <!-- SUB-HALAMAN B: LEMBAR SOAL UJIAN CBT -->
        <div id="section-ujian" class="page-section">
            <div class="form-title" id="judul-ujian">Lembar Kerja Ujian</div>
            <div id="box-soal-cbt"></div>
            <div class="btn-container">
                <button class="btn btn-submit" id="btn-selesai" onclick="hitungDanKirimNilai()">Selesai & Kirim Nilai</button>
            </div>
        </div>
    </div>
       <script>
        // URL Web App Apps Script resmi Anda
        const API_URL = "https://script.google.com/macros/s/AKfycbyaIKhpTPFX8agYAJ-s9v2j2dk0AMtTZLndtO5_151e9z1yio7OkqI2fKLUcsL508LM/exec";
        
        let infoSiswa = {};
        let kunciJawabanAsli = []; 
        let statusSiswaValid = false;

        // ==========================================
        // FUNGSI 1: VERIFIKASI ID SISWA (CEK ID)
        // ==========================================
        function verifikasiIdSiswa() {
            const inputId = document.getElementById('nisn').value.trim();
            const txtSiswaStatus = document.getElementById('siswa-status');
            const txtNama = document.getElementById('nama');
            const txtKelas = document.getElementById('kelas');
            const btnPeriksa = document.getElementById('btn-periksa');

            if (!inputId) {
                alert("Mohon ketik NISN / ID Siswa terlebih dahulu!");
                return;
            }

            btnPeriksa.innerText = "Memeriksa...";
            btnPeriksa.disabled = true;
            txtSiswaStatus.innerText = "Mencari di data absen...";
            txtSiswaStatus.style.color = "#3182ce";

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "cekSiswa", idSiswa: inputId })
            })
            .then(response => response.json())
            .then(res => {
                btnPeriksa.innerText = "Cek ID";
                btnPeriksa.disabled = false;

                if (res.status === "success" && res.found) {
                    txtNama.value = res.nama;
                    txtKelas.value = res.kelas;
                    
                    txtSiswaStatus.innerText = "Siswa Terdaftar! Identitas berhasil dikunci.";
                    txtSiswaStatus.style.color = "#22c55e";
                    
                    statusSiswaValid = true;
                    ambilDaftarPertemuan();
                } else {
                    txtNama.value = "";
                    txtKelas.value = "";
                    txtSiswaStatus.innerText = "ID Siswa tidak terdaftar di database absen!";
                    txtSiswaStatus.style.color = "#f45050";
                    statusSiswaValid = false;
                    
                    document.getElementById('pertemuan').disabled = true;
                    document.getElementById('pertemuan').innerHTML = '<option value="">-- Kunci ID Terlebih Dahulu --</option>';
                    document.getElementById('btn-lanjut').disabled = true;
                }
            })
            .catch(err => {
                console.error(err);
                btnPeriksa.innerText = "Cek ID";
                btnPeriksa.disabled = false;
                txtSiswaStatus.innerText = "Gagal memproses data. Cek koneksi internet.";
                txtSiswaStatus.style.color = "#f45050";
            });
        }

                // ==========================================
        // FUNGSI 2: AMBIL DAFTAR PERTEMUAN BANK SOAL
        // ==========================================
        function ambilDaftarPertemuan() {
            const selectPertemuan = document.getElementById('pertemuan');
            const statusText = document.getElementById('loading-status');
            const btnLanjut = document.getElementById('btn-lanjut');

            statusText.innerText = "Menghubungkan ke database bank soal...";
            statusText.style.color = "#3182ce";

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getDaftarMenu" })
            })
            .then(response => response.json())
            .then(res => {
                if (res.status === "success") {
                    const filtered = res.data.filter(item => item.tipe === "Latihan Soal");
                    
                    selectPertemuan.innerHTML = '<option value="">-- Pilih Pertemuan --</option>';
                    filtered.forEach(item => {
                        let opt = document.createElement('option');
                        opt.value = item.idDoc; 
                        opt.setAttribute('data-kolom', "Nilai_Latihan_" + item.pertemuan);
                        opt.innerText = "Pertemuan " + item.pertemuan + " - " + item.judul;
                        selectPertemuan.appendChild(opt);
                    });
                    
                    selectPertemuan.disabled = false;
                    btnLanjut.disabled = false;
                    statusText.innerText = "Silakan pilih pertemuan ujian.";
                    statusText.style.color = "#22c55e";
                } else {
                    statusText.innerText = "Gagal memuat bank pertemuan.";
                    statusText.style.color = "#f45050";
                }
            })
            .catch(err => {
                console.error(err);
                statusText.innerText = "Koneksi bank soal terputus.";
                statusText.style.color = "#f45050";
            });
        }

        // ==========================================
        // FUNGSI 3: AMBIL ISI TEKS SOAL DARI GOOGLE DOC
        // ==========================================
        function ambilSoalDariDoc() {
            const selectPertemuan = document.getElementById('pertemuan');
            const idDoc = selectPertemuan.value ? selectPertemuan.value.trim() : "";

            if (!statusSiswaValid) {
                alert('ID Siswa belum terverifikasi!');
                return;
            }
            if (!idDoc) {
                alert('Mohon pilih pertemuan terlebih dahulu!');
                return;
            }

            infoSiswa = {
                idSiswa: document.getElementById('nisn').value.trim(),
                nama: document.getElementById('nama').value,
                kelas: document.getElementById('kelas').value,
                kolomLatihan: selectPertemuan.options[selectPertemuan.selectedIndex].getAttribute('data-kolom')
            };

            document.getElementById('btn-lanjut').innerText = "Memuat Soal...";
            document.getElementById('btn-lanjut').disabled = true;

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getDocContent", idDoc: idDoc })
            })
            .then(response => response.json())
            .then(res => {
                if (res.status === "success") {
                    parseTeksMenjadiSoal(res.content);
                    document.getElementById('section-identitas').classList.remove('page-active');
                    document.getElementById('section-ujian').classList.add('page-active');
                } else {
                    console.error("Gagal dari API:", res.message);
                    alert("Gagal memuat dokumen soal: " + (res.message || "Pastikan ID Dokumen benar."));
                    
                    document.getElementById('btn-lanjut').innerText = "Mulai Ujian";
                    document.getElementById('btn-lanjut').disabled = false;
                }
            })
            .catch(err => {
                console.error("Koneksi Error:", err);
                alert("Terjadi kesalahan koneksi internet atau script Google Anda belum di-deploy dengan benar.");
                document.getElementById('btn-lanjut').innerText = "Mulai Ujian";
                document.getElementById('btn-lanjut').disabled = false;
            });
        }

        // ==========================================
        // FUNGSI 4: PARSING TEKS MENJADI TAMPILAN CBT
        // ==========================================
function parseTeksMenjadiSoal(teksPenuh) {
    const containerBox = document.getElementById('box-soal-cbt');
    containerBox.innerHTML = ""; 
    kunciJawabanAsli = []; // Membersihkan data lama

    // Memecah teks dokumen berdasarkan tag [Soal 1], [Soal 2], dst
    const islands = teksPenuh.split(/\[Soal\s*\d+\]/i);
    let nomorUrut = 1;

    for (let i = 1; i < islands.length; i++) {
        let teksBlok = islands[i].trim();
        if (!teksBlok) continue;

        // Ambil baris kunci jawaban setelah tanda titik dua
        let barisKunci = teksBlok.match(/Kunci[\s\xA0]*:[\s\xA0]*(.*)/i);
        let kunciBersih = "";
        if (barisKunci && barisKunci[1]) {
            kunciBersih = barisKunci[1].trim();
        }
        
        // Memasukkan kunci asli ke array (1 soal = 1 kunci, tidak diduplikat)
        kunciJawabanAsli.push(kunciBersih);

        let barisBarisRaw = teksBlok.split("\n").map(b => b.trim()).filter(b => b !== "");
        let kalimatPertanyaanArr = [];
        let daftarOpsi = [];

        for (let j = 0; j < barisBarisRaw.length; j++) {
            let barisAktif = barisBarisRaw[j];
            if (/^Kunci/i.test(barisAktif) || barisAktif.toUpperCase().includes("KUNCI")) {
                continue; 
            }
            
            // Deteksi jika ini adalah pilihan ganda A sampai E
            let opsiMatch = barisAktif.match(/^([A-E])\s*[\)[\]|\.]\s*(.*)/i);
            if (opsiMatch) {
                daftarOpsi.push({ 
                    huruf: opsiMatch[1].toUpperCase(), 
                    teksOpsi: opsiMatch[2] 
                });
            } else {
                kalimatPertanyaanArr.push(barisAktif);
            }
        }

        let kalimatPertanyaan = kalimatPertanyaanArr.join("<br>");
        kalimatPertanyaan = kalimatPertanyaan.replace(/\[GAMBAR:\s*(https?:\/\/[^\s\]]+)\s*\]/gi, function(match, urlGbr) {
            return `<br><img src="${urlGbr}" style="max-width:100%; height:auto; display:block; margin:10px 0; border-radius:8px;">`;
        }); 

        let htmlSoal = `<div class="soal-card"><div class="soal-teks" data-indeks="${nomorUrut - 1}">${nomorUrut}. ${kalimatPertanyaan}</div><div class="pilihan-container">`;

        // Jika tidak ada pilihan A-E, maka otomatis dirender sebagai Textarea Uraian/Essay
        if (daftarOpsi.length === 0) {
            htmlSoal += `
            <textarea name="soal_${nomorUrut}" data-tipe="essay" class="input-uraian" rows="4" 
            style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; font-family:inherit; resize:vertical;" placeholder="Ketik jawaban uraian Anda di sini..."></textarea>
            `;
        } else {
            daftarOpsi.forEach(opsi => {
                htmlSoal += `
                <label class="pilihan-item">
                <input type="radio" name="soal_${nomorUrut}" data-tipe="pg" value="${opsi.huruf}">
                <span>${opsi.huruf}. ${opsi.teksOpsi}</span>
                </label>
                `;
            });
        }
        htmlSoal += `</div></div>`;
        containerBox.innerHTML += htmlSoal;
        nomorUrut++;
    }
}

        // ==========================================
        // FUNGSI 5: HITUNG SKOR & KIRIM HASIL KE AI
        // ==========================================
function hitungDanKirimNilai() {
    let benarPG = 0;
    let totalPG = 0;
    let dataSoalUraian = [];
    let totalSoal = kunciJawabanAsli.length;

    // === 1. VALIDASI PENGISIAN ===
    for (let i = 0; i < totalSoal; i++) {
        let nomorSoal = i + 1;
        let elemenRadioChecked = document.querySelector(`input[name="soal_${nomorSoal}"]:checked`);
        let elemenUraian = document.querySelector(`textarea[name="soal_${nomorSoal}"]`);
        let apakahIniSoalPG = document.querySelector(`input[type="radio"][name="soal_${nomorSoal}"]`);

        if (apakahIniSoalPG && !elemenRadioChecked) {
            alert(`Waduh, soal nomor ${nomorSoal} (Pilihan Ganda) belum kamu isi nih!`);
            return;
        } 
        if (elemenUraian && elemenUraian.value.trim() === "") {
            alert(`Waduh, soal nomor ${nomorSoal} (Uraian) belum kamu isi nih!`);
            elemenUraian.focus();
            return;
        }
    }

    // === 2. PROSES HITUNG SKOR SECARA SINKRON ===
    for (let i = 0; i < totalSoal; i++) {
        let nomorSoal = i + 1;
        let elemenRadioChecked = document.querySelector(`input[name="soal_${nomorSoal}"]:checked`);
        let elemenUraian = document.querySelector(`textarea[name="soal_${nomorSoal}"]`);

        if (elemenRadioChecked) {
            totalPG++;
            let jawabanSiswa = elemenRadioChecked.value.trim().toUpperCase();
            // Memastikan mengambil kunci pembanding murni huruf A-E
            let kunciBenar = kunciJawabanAsli[i].trim().toUpperCase().replace(/[^A-E]/g, "");
            if (jawabanSiswa === kunciBenar) {
                benarPG++;
            }
        } else if (elemenUraian) {
            let elemenCard = elemenUraian.closest('.soal-card');
            let teksPertanyaan = "Soal Uraian " + nomorSoal;
            if (elemenCard) {
                let elemenTeksSoal = elemenCard.querySelector('.soal-teks');
                if (elemenTeksSoal) {
                    teksPertanyaan = elemenTeksSoal.innerText.replace(/^\d+\.\s*/, ""); 
                }
            }
            // Mengirim data pertanyaan, panduan kunci dokumen, dan jawaban siswa ke array AI
            dataSoalUraian.push({
                pertanyaan: teksPertanyaan,
                kunciPanduan: kunciJawabanAsli[i],
                jawabanSiswa: elemenUraian.value.trim()
            });
        }
    }

    let nilaiMurniPG = totalPG > 0 ? (benarPG / totalPG) * 100 : 0;

    // === 3. KONFIRMASI DAN PENGIRIMAN DATA KE SERVER ===
    if (confirm("Apakah Anda yakin ingin menyelesaikan ujian? AI akan memeriksa jawaban essay Anda secara otomatis.")) {
        const btnSelesai = document.getElementById('btn-selesai');
        if (btnSelesai) { btnSelesai.style.display = 'none'; }

        document.getElementById('box-soal-cbt').innerHTML = `
        <div style='text-align:center; padding:40px;'>
        <p style='font-size: 18px; font-weight: bold;'>AI sedang memeriksa jawaban Essay Anda...</p>
        <p style='color: #666; margin-top: 5px;'>Mohon tunggu sebentar, jangan menutup halaman ini.</p>
        </div>`;

        const dataPaket = {
            action: "prosesNilaiDanEssayAI", 
            idSiswa: document.getElementById('nisn').value.trim(),
            kolomLatihan: infoSiswa.kolomLatihan,
            nilaiPG: nilaiMurniPG,
            dataEssay: dataSoalUraian
        };

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(dataPaket)
        })
        .then(response => {
            if (!response.ok) { throw new Error("Koneksi ke Web App gagal."); }
            return response.json();
        })
        .then(res => {
            if (res.status === "success") {
                alert("Ujian selesai!\n\n" +
                "Nilai PG: " + res.nilaiPG + "\n" +
                "Nilai Essay (AI): " + res.nilaiEssay + "\n" +
                "Nilai Akhir Gabungan: " + res.nilaiTotal + "\n\n" +
                "Data berhasil disimpan ke Google Sheets.");
                window.location.href = "index.html";
            } else {
                alert("Gagal memproses nilai: " + (res.message || "Terjadi kesalahan di server."));
                document.getElementById('box-soal-cbt').innerHTML = `<p style='text-align:center; color:red;'>Gagal mengirim. Silakan muat ulang halaman atau hubungi pengajar.</p>`;
                if (btnSelesai) { btnSelesai.style.display = 'block'; }
            }
        })
        .catch(err => {
            console.error("Error Network:", err);
            alert("Gagal terhubung ke server ujian: " + err.message);
            if (btnSelesai) { btnSelesai.style.display = 'block'; }
        });
    }
}
async function kirimAbsenSiswa(idSiswa, namaSiswa, kelas) {
    const url = `${WEB_APP_URL}?action=siswaAbsen&idSiswa=${idSiswa}&namaSiswa=${encodeURIComponent(namaSiswa)}&kelas=${encodeURIComponent(kelas)}&status=Hadir`;
    try {
        const response = await fetch(url);
        const res = await response.json();
        if(res.status === "success") alert("Absen Anda hari ini berhasil tercatat!");
    } catch (e) {
        console.error("Gagal mengirim absensi:", e);
    }
}
