<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Absensi & Nilai - SMAN 15 Maluku Tengah</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f4f6f9; min-height: 100vh; width: 100%; }
        .page-wrapper { display: flex; justify-content: center; align-items: flex-start; padding: 15px 10px 30px 10px; width: 100%; }
        .rekap-container { background-color: #ffffff; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; border: 3px solid #22c55e; }
        .rekap-header { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); color: white; padding: 20px 15px; display: flex; align-items: center; gap: 15px; }
        .btn-kembali { background: rgba(255, 255, 255, 0.2); border: none; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-weight: bold; font-size: 16px; flex-shrink: 0; }
        .header-title h1 { font-size: 16px; font-weight: 700; line-height: 1.2; }
        .header-title p { font-size: 11px; opacity: 0.9; margin-top: 2px; }
        
        .filter-section { padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 12px; font-weight: 600; color: #4a5568; }
        .form-control { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
        .form-control:focus { border-color: #22c55e; }

        /* Desain Khusus Tabel agar Bisa Digeser Horizontal di Layar HP */
        .table-responsive-wrapper { width: 100%; overflow-x: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; font-size: 12px; text-align: left; }
        th { background-color: #22c55e; color: white; font-weight: 600; padding: 10px; border: 1px solid #e2e8f0; white-space: nowrap; }
        td { padding: 10px; border: 1px solid #e2e8f0; color: #2d3748; white-space: nowrap; }
        tr:nth-child(even) { background-color: #f8fafc; }

        /* Badge Status untuk mempercantik tampilan tabel */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; color: white; display: inline-block; }
        .bg-hadir { background-color: #3182ce; }
        .bg-sakit { background-color: #dd6b20; }
        .bg-izin { background-color: #38a169; }
        .bg-alpa { background-color: #e53e3e; }
        
        .loading-text { font-size: 13px; color: #22c55e; font-style: italic; text-align: center; padding: 20px; display: none; }
        .empty-text { font-size: 12px; color: #a0aec0; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="rekap-container">
            <div class="rekap-header">
                <a href="admin.html" class="btn-kembali">&#10094;</a>
                <div class="header-title">
                    <h1>REKAPITULASI JURNAL</h1>
                    <p>Pendidikan Pancasila - SMAN 15 Maluku Tengah</p>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="form-group">
                    <label for="kelasFilter">Pilih Kelas untuk Dipantau</label>
                    <select id="kelasFilter" class="form-control" disabled>
                        <option value="">-- Memuat Kelas dari Google Sheet... --</option>
                    </select>
                </div>

                <!-- TOMBOL UNDUH BARU KHUSUS LAYAR HP -->
                <div id="downloadSection" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
                    <button onclick="unduhLaporan('excel')" style="background-color: #107c41; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;">
                        📊 Unduh Excel
                    </button>
                    <button onclick="unduhLaporan('pdf')" style="background-color: #f43f5e; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;">
                        📄 Cetak PDF
                    </button>
                </div>
            </div>
            
            <div id="textLoading" class="loading-text">🔄 Sedang menarik tabel matriks dari Google Sheet...</div>
            <div id="textKosong" class="empty-text">Silakan pilih kelas terlebih dahulu untuk melihat rekapitulasi data.</div>

            <div class="table-responsive-wrapper" id="tableWrapper" style="display: none;">
                <table id="tabelRekapMatriks">
                    <thead>
                        <tr id="tabelHeaderRow"></tr>
                    </thead>
                    <tbody id="tabelBodyData"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        // 🚀 PASTIKAN URL WEB APP GOOGLE APPS SCRIPT ANDA SUDAH SAMA
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnWrksg3ZcsKNREjcsJmelvPcmbYU4APCC_laZXyR0ZMR-6oa-xh_oUAD07xFEh3qI/exec";

        const elKelasFilter = document.getElementById('kelasFilter');
        const textLoading = document.getElementById('textLoading');
        const textKosong = document.getElementById('textKosong');
        const tableWrapper = document.getElementById('tableWrapper');
        const downloadSection = document.getElementById('downloadSection');
        const tabelHeaderRow = document.getElementById('tabelHeaderRow');
        const tabelBodyData = document.getElementById('tabelBodyData');

        async function muatFilterKelasOtomatis() {
            try {
                const respon = await fetch(`${GOOGLE_SCRIPT_URL}?action=getKelasOnly`);
                const dataKelas = await respon.json();
                elKelasFilter.innerHTML = '<option value="">-- Pilih Kelas --</option>';
                dataKelas.forEach(kelas => {
                    elKelasFilter.innerHTML += `<option value="${kelas}">${kelas}</option>`;
                });
                elKelasFilter.disabled = false;
            } catch (e) {
                elKelasFilter.innerHTML = '<option value="">❌ Gagal Sinkronisasi Server</option>';
            }
        }
        window.addEventListener('DOMContentLoaded', muatFilterKelasOtomatis);

        async function ambilDataMatriksSheet() {
            const kelasDipilih = elKelasFilter.value;
            if (!kelasDipilih) {
                tableWrapper.style.display = 'none';
                downloadSection.style.display = 'none';
                textKosong.style.display = 'block';
                return;
            }

            textKosong.style.display = 'none';
            tableWrapper.style.display = 'none';
            downloadSection.style.display = 'none';
            textLoading.style.display = 'block';
            tabelHeaderRow.innerHTML = '';
            tabelBodyData.innerHTML = '';

            try {
                const respon = await fetch(`${GOOGLE_SCRIPT_URL}?action=getRekapMatriks&kelas=${encodeURIComponent(kelasDipilih)}`);
                const dataMatriks = await respon.json();

                if (dataMatriks.headers && dataMatriks.headers.length > 0) {
                    dataMatriks.headers.forEach(headerText => {
                        tabelHeaderRow.innerHTML += `<th>${headerText}</th>`;
                    });

                    dataMatriks.rows.forEach(barisSiswa => {
                        let susunanHtmlKolom = '';
                        barisSiswa.forEach((cellValue, indexCell) => {
                            if (indexCell >= 2 && cellValue !== "") {
                                let kelasBadge = "";
                                if (cellValue === "Hadir") kelasBadge = "bg-hadir";
                                else if (cellValue === "Sakit") kelasBadge = "bg-sakit";
                                else if (cellValue === "Izin") kelasBadge = "bg-izin";
                                else if (cellValue === "Alpa") kelasBadge = "bg-alpa";
                                susunanHtmlKolom += `<td><span class="badge ${kelasBadge}">${cellValue.toUpperCase()}</span></td>`;
                            } else {
                                susunanHtmlKolom += `<td>${cellValue || '-'}</td>`;
                            }
                        });
                        tabelBodyData.innerHTML += `<tr>${susunanHtmlKolom}</tr>`;
                    });

                    textLoading.style.display = 'none';
                    tableWrapper.style.display = 'block';
                    downloadSection.style.display = 'grid'; // Tampilkan tombol download setelah data masuk
                } else {
                    textLoading.style.display = 'none';
                    textKosong.innerText = "Tidak ditemukan baris data di kelas ini.";
                    textKosong.style.display = 'block';
                }
            } catch (err) {
                textLoading.style.display = 'none';
                textKosong.innerText = "❌ Terjadi kesalahan saat membaca database Sheet.";
                textKosong.style.display = 'block';
            }
        }

        elKelasFilter.addEventListener('change', ambilDataMatriksSheet);

        // FUNGSI LOGIKA UNDUH: MENEMBAK LINK STRUKTUR GOOGLE EXPORT API
       // GANTI FUNGSI UNDUH LAMA ANDA DENGAN KODE STABIL INI
// GANTI FUNGSI unduhLaporan DI rekap.html ANDA DENGAN KODE SINKRONISASI INI
// GANTI FUNGSI UNDUH LAMA DENGAN KODE SUPER INSTAN & STABIL INI
// GANTI FUNGSI UNDUH LAMA DENGAN KODE SUPER RINGAN & ANTI-CRASH INI
function unduhLaporan(format) {
    const kelas = elKelasFilter.value;
    if (!kelas) return;

    const namaFile = `Rekap_Absen_Kelas_${kelas.replace(/\s+/g, '_')}`;

    if (format === 'excel') {
        // Jika butuh Excel tanpa pustaka berat, sistem akan otomatis mengalihkan guru 
        // untuk mengunduh file master Excel asli langsung dari gerbang resmi ekspor Google Sheet
        const ssId = GOOGLE_SCRIPT_URL.split("/s/")[1].split("/exec")[0]; // Otomatis mendeteksi ID dari script URL Anda
        const urlExcel = `https://google.com{ssId}/export?format=xlsx`;
        
        const linkBayangan = document.createElement('a');
        linkBayangan.href = urlExcel;
        linkBayangan.target = '_blank';
        document.body.appendChild(linkBayangan);
        linkBayangan.click();
        document.body.removeChild(linkBayangan);
        
    } else if (format === 'pdf') {
        // 📄 PROSES CETAK PDF BAWAAN SISTEM (ANTI-LAG & ANTI-CRASH)
        // Menyembunyikan elemen dekorasi luar agar kertas cetak murni berisi tabel data kelas terpilih
        const headerLms = document.querySelector('.rekap-header');
        const filterSec = document.querySelector('.filter-section');
        
        if (headerLms) headerLms.style.display = 'none';
        if (filterSec) filterSec.style.display = 'none';
        
        // Mengubah judul dokumen sementara agar saat disimpan di HP, nama file PDF otomatis rapi
        const judulAsli = document.title;
        document.title = namaFile;

        // Memanggil jendela dialog cetak PDF asli milik sistem operasi HP / Komputer Anda
        window.print();

        // Mengembalikan tampilan tombol-tombol web 0.5 detik setelah dialog cetak ditutup
        setTimeout(() => {
            if (headerLms) headerLms.style.display = 'flex';
            if (filterSec) filterSec.style.display = 'flex';
            document.title = judulAsli;
        }, 500);
    }
}

</script>
</body>
</html>
