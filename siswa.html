<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Asesmen Sumatif</title>
    <style>
        /* 1. Pengaturan Dasar Halaman */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f6f9; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        /* 2. Wadah Utama Aplikasi (Ukuran HP) */
        .lms-container { background-color: #ffffff; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; border: 3px solid #1a5f7a; margin-top: 10px; }
        
        /* 3. Banner Atas Halaman */
        .lms-header { background: linear-gradient(135deg, #1a5f7a 0%, #103f52 100%); color: white; text-align: center; padding: 25px 15px; position: relative; }
        .lms-header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .badge-page { background-color: #3182ce; color: white; padding: 6px 16px; border-radius: 30px; font-size: 12px; font-weight: 600; display: inline-block; margin-bottom: 10px; }
        
        /* 4. Wadah Jam Digital Hitung Mundur */
        .timer-box { background-color: #f45050; color: white; padding: 8px 15px; border-radius: 10px; font-size: 14px; font-weight: 700; margin-top: 10px; display: none; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.85; } 100% { opacity: 1; } }

        /* 5. Pengaturan Sembunyikan/Munculkan Konten */
        .page-section { display: none; padding: 20px 15px; background-color: #ffffff; }
        .page-active { display: flex; flex-direction: column; }
        
        /* 6. Desain Formulir Identitas */
        .form-title { font-size: 16px; font-weight: 700; color: #1a5f7a; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #475569; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 14px; color: #334155; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #1a5f7a; }
        
        /* 7. Baris NISN mendatar berjejer dengan Tombol */
        .input-btn-group { display: flex; gap: 8px; }
        .input-btn-group input { flex: 1; }
        .btn-cek { background-color: #f45050; color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .loading-text { font-size: 11px; color: #64748b; font-style: italic; margin-top: 2px; }
        
        /* 8. Desain Kotak Kartu Soal */
        .soal-card { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .soal-teks { font-size: 14px; color: #1e293b; font-weight: 600; margin-bottom: 12px; line-height: 1.5; }
        .pilihan-container { display: flex; flex-direction: column; gap: 10px; }
        .pilihan-item { display: flex; align-items: center; gap: 10px; background: white; border: 2px solid #cbd5e1; border-radius: 8px; padding: 10px 12px; cursor: pointer; font-size: 13px; color: #334155; transition: all 0.2s; }
        
        /* 9. Tombol Navigasi Bawah */
        .btn-container { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-submit { background-color: #1a5f7a; color: white; }
    </style>
</head>
<body>
<div class="lms-container">
    <!-- A. Banner Judul Aplikasi -->
    <div class="lms-header">
        <div style="font-size: 13px; font-weight: 600; letter-spacing: 1px; color: #cbd5e1; margin-bottom: 2px;">SMA NEGERI 15 MALUKU TENGAH</div>
        <h1 style="font-size: 18px; font-weight: 700; margin-bottom: 6px;">PENDIDIKAN PANCASILA</h1>
        <div class="badge-page">Asesmen Sumatif</div>
        <!-- Kotak Sisa Waktu (Hitung Mundur) -->
        <div id="countdown-timer" class="timer-box">Sisa Waktu: --:--</div>
    </div>

    <!-- B. PANEL 1: FORMULIR IDENTITAS SISWA -->
    <div id="section-identitas" class="page-section page-active">
        <div class="form-title">Identitas Peserta Didik</div>
        
        <!-- Input NISN & Tombol Cek -->
        <div class="form-group">
            <label for="nisn"> ID Siswa</label>
            <div class="input-btn-group">
                <input type="number" id="nisn" placeholder="Masukkan ID Siswa...">
                <button class="btn-cek" id="btn-periksa" onclick="verifikasiIdSiswa()">Cek ID</button>
            </div>
            <span id="siswa-status" class="loading-text">Silakan masukkan ID lalu klik Cek ID</span>
        </div>

        <!-- Input Nama Lengkap (Readonly / Tidak Bisa Diedit) -->
        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Akan terisi otomatis..." readonly style="background-color: #f1f5f9;">
        </div>

        <!-- Input Kelas (Readonly / Tidak Bisa Diedit) -->
        <div class="form-group">
            <label for="kelas">Kelas</label>
            <input type="text" id="kelas" placeholder="Akan terisi otomatis..." readonly style="background-color: #f1f5f9;">
        </div>

        <!-- Dropdown Paket Ujian Sumatif -->
        <div class="form-group">
            <label for="pertemuan">Pilih Paket Asesmen</label>
            <select id="pertemuan" disabled>
                <option value="">-- Kunci ID Terlebih Dahulu --</option>
            </select>
            <span id="loading-status" class="loading-text">Menunggu verifikasi identitas...</span>
        </div>

        <!-- Input Kata Kunci / Token Token Ujian Dinamis -->
        <div class="form-group" id="group-token" style="display: none;">
            <label for="token-ujian">Masukkan Kata Kunci / Token</label>
            <input type="text" id="token-ujian" placeholder="Ketik token dari guru...">
        </div>

        <!-- Tombol Aktivasi Mulai -->
        <div class="btn-container">
            <button class="btn btn-submit" id="btn-lanjut" onclick="validasiSebelumMulai()" disabled>Mulai Ujian</button>
        </div>
    </div>

    <!-- C. PANEL 2: LEMBAR UTAMA SOAL CBT -->
    <div id="section-ujian" class="page-section">
        <div class="form-title" id="judul-ujian">Lembar Kerja Ujian</div>
        
        <!-- Wadah Kosong Tempat Soal Disuntikkan oleh JavaScript -->
        <div id="box-soal-cbt"></div>
        
        <!-- Tombol Submit Selesai -->
        <div class="btn-container">
            <button class="btn btn-submit" id="btn-selesai" onclick="hitungDanKirimNilai()">Selesai & Kirim Nilai</button>
        </div>
    </div>
</div>
<script>
// PENTING: TEMPELKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI NANTI
const API_URL = "https://script.google.com/macros/s/AKfycbyrrF-fNhUYcKUetVoalOT-Unrd2s8WuXVu_PCaagicTyiJgewnvgN1lgm7ty7zU0fNag/exec";

// Variabel Global Penampung Data
let infoSiswa = {};
let kunciJawabanAsli = []; 
let statusSiswaValid = false;
let jumlahPelanggaran = 0; 
let sedangUjian = false;   
let timerInterval; 
let tokenKunciDinamis = ""; // Menyimpan token asli dari baris spreadsheet yang dipilih

// 1. FUNGSI VERIFIKASI ID SISWA (NISN)
function verifikasiIdSiswa() {
    const inputId = document.getElementById('nisn').value.trim();
    const txtSiswaStatus = document.getElementById('siswa-status');
    const txtNama = document.getElementById('nama');
    const txtKelas = document.getElementById('kelas');
    const btnPeriksa = document.getElementById('btn-periksa');

    if (!inputId) return alert("Mohon ketik NISN / ID Siswa terlebih dahulu!");
    
    btnPeriksa.innerText = "Memeriksa...";
    btnPeriksa.disabled = true;
    txtSiswaStatus.innerText = "Mencari di database...";
    txtSiswaStatus.style.color = "#3182ce";

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "cekSiswa", idSiswa: inputId })
    })
    .then(response => response.json())
    .then(res => {
        btnPeriksa.innerText = "Cek ID";
        btnPeriksa.disabled = false;
        if (res.status === "success" && res.found) {
            txtNama.value = res.nama;
            txtKelas.value = res.kelas;
            txtSiswaStatus.innerText = "Siswa Terdaftar! Identitas dikunci.";
            txtSiswaStatus.style.color = "#22c55e";
            statusSiswaValid = true;
            ambilDaftarPertemuan(); // Panggil daftar paket ujian
        } else {
            txtNama.value = ""; txtKelas.value = "";
            txtSiswaStatus.innerText = "ID tidak ditemukan!";
            txtSiswaStatus.style.color = "#f45050";
            statusSiswaValid = false;
            document.getElementById('pertemuan').disabled = true;
            document.getElementById('btn-lanjut').disabled = true;
        }
    })
    .catch(err => {
        btnPeriksa.innerText = "Cek ID"; btnPeriksa.disabled = false;
        txtSiswaStatus.innerText = "Koneksi gagal."; txtSiswaStatus.style.color = "#f45050";
    });
}
// 2. FUNGSI MEMUAT DAFTAR UJIAN SUMATIF DARI SPREADSHEET
function ambilDaftarPertemuan() {
    const selectPertemuan = document.getElementById('pertemuan');
    const statusText = document.getElementById('loading-status');
    const btnLanjut = document.getElementById('btn-lanjut');
    statusText.innerText = "Menghubungkan ke bank soal...";
    statusText.style.color = "#3182ce";

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getDaftarMenu" })
    })
    .then(response => response.json())
    .then(res => {
        if (res.status === "success") {
            selectPertemuan.innerHTML = '<option value="">-- Pilih Paket Ujian --</option>';
            res.data.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.idDoc; 
                
                // MENGUNCI TARGET PENAMAAN KOLOM SESUAI KESEPAKATAN ASESMEN SUMATIF
                opt.setAttribute('data-kolom', "Asesmen Sumatif " + item.pertemuan);
                
                // MENYIMPAN DATA DINAMIS PER BARIS KEDALAM ATRIBUT DROPDOWN
                opt.setAttribute('data-durasi', item.waktu || 60); 
                opt.setAttribute('data-token', item.kataKunci || ""); 
                
                opt.innerText = item.judul; // Muncul misal: "Ulangan Harian 1"
                selectPertemuan.appendChild(opt);
            });
            selectPertemuan.disabled = false;
            btnLanjut.disabled = false;
            statusText.innerText = "Silakan pilih paket ujian.";
            statusText.style.color = "#22c55e";

            // Pasang event listener jika pilihan dropdown berubah
            selectPertemuan.onchange = function() {
                const selectedOpt = selectPertemuan.options[selectPertemuan.selectedIndex];
                tokenKunciDinamis = selectedOpt.getAttribute('data-token') || "";
                if(tokenKunciDinamis !== "") {
                    document.getElementById('group-token').style.display = "block";
                } else {
                    document.getElementById('group-token').style.display = "none";
                }
            };
        } else {
            statusText.innerText = "Gagal memuat daftar ujian.";
            statusText.style.color = "#f45050";
        }
    });
}

// 3. VALIDASI TOKEN SEBELUM AMBIL SOAL
// 3. VALIDASI TOKEN DAN PEMBATASAN SATU KALI UJIAN SEBELUM AMBIL SOAL (ANTI-MACET)
function validasiSebelumMulai() {
    const inputToken = document.getElementById('token-ujian').value.trim();
    const selectPertemuan = document.getElementById('pertemuan');
    const btnLanjut = document.getElementById('btn-lanjut');
    const inputId = document.getElementById('nisn').value.trim();

    // 1. Validasi Token/Kata Kunci bawaan Anda
    if (tokenKunciDinamis !== "" && inputToken !== tokenKunciDinamis) {
        return alert("Kata Kunci / Token Ujian yang Anda masukkan salah!");
    }

    // Ambil nama kolom yang akan dituju (Contoh: "Asesmen Sumatif 1")
    const namaKolomUjian = selectPertemuan.options[selectPertemuan.selectedIndex].getAttribute('data-kolom');

    // Ubah tampilan tombol agar siswa tahu sistem sedang memverifikasi data
    btnLanjut.innerText = "Memvalidasi Akses...";
    btnLanjut.disabled = true;

    // 2. Ketuk pintu server (Kode.gs) untuk memastikan siswa belum punya nilai di kolom tersebut
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ 
            action: "cekSiswa", 
            idSiswa: inputId,
            kolomLatihan: namaKolomUjian // Mengirimkan "Asesmen Sumatif X" ke server
        })
    })
    .then(response => response.json())
    .then(res => {
        // Kembalikan status tombol ke normal jika pengecekan selesai
        btnLanjut.innerText = "Mulai Ujian";
        btnLanjut.disabled = false;

        if (res.status === "success") {
            // JIKA TERDETEKSI SUDAH PERNAH UJIAN (BLOKIR MUTLAK)
            if (res.sudahUjian) {
                alert(res.message); // Menampilkan: "Maaf [Nama], Anda sudah memiliki riwayat nilai..."
                return; // Stop di sini! Siswa tidak akan bisa masuk ke lembar soal
            }

            // JIKA LOLOS (Belum pernah ujian), LANJUTKAN KE FUNGSI ASLI ANDA
            ambilSoalDariDoc();
        } else {
            alert("Gagal memvalidasi status akses: " + res.message);
        }
    })
    .catch(err => {
        btnLanjut.innerText = "Mulai Ujian";
        btnLanjut.disabled = false;
        alert("Terjadi kesalahan jaringan saat memverifikasi status ujian.");
        console.error(err);
    });
}
// 4. FUNGSI MENGAMBIL ISI KONTEN GOOGLE DOCS

// 4. FUNGSI MENGAMBIL ISI KONTEN GOOGLE DOCS (SUDAH DISISIPKAN LOG MASUK UJIAN)
function ambilSoalDariDoc() {
    const selectPertemuan = document.getElementById('pertemuan');
    const idDoc = selectPertemuan.value ? selectPertemuan.value.trim() : "";
    const menitUjian = parseInt(selectPertemuan.options[selectPertemuan.selectedIndex].getAttribute('data-durasi')) || 60;

    if (!statusSiswaValid) return alert('ID Siswa belum terverifikasi!');
    if (!idDoc) return alert('Mohon pilih paket ujian terlebih dahulu!');

    // Sediakan data siswa untuk dipakai nanti
    const inputId = document.getElementById('nisn').value.trim();
    const namaKolomUjian = selectPertemuan.options[selectPertemuan.selectedIndex].getAttribute('data-kolom');

    infoSiswa = {
        idSiswa: inputId,
        kolomLatihan: namaKolomUjian
    };

    document.getElementById('btn-lanjut').innerText = "Memuat Soal...";
    document.getElementById('btn-lanjut').disabled = true;

    // Langkah A: Ambil Konten Soal dari Google Docs
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getDocContent", idDoc: idDoc })
    })
    .then(response => response.json())
    .then(res => {
        if (res.status === "success") {
            
            // =================================================================
            // TAMBAHAN: KIRIM LOG "masuk_ujian" AGAR MONITOR MONITOR PENGAWAS BERUBAH
            // =================================================================
            console.log("Soal termuat. Mengirim status aktivitas ke pengawas...");
            
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors", // Digunakan agar tidak terhambat CORS di localhost / Live Server
                body: JSON.stringify({
                    action: "masuk_ujian", // Menembak target Aksi Baru di doPost(e)
                    idSiswa: inputId,
                    kolomLatihan: namaKolomUjian,
                    status: "Sedang Ujian",
                    gps: "Lokasi Terlacak"
                })
            }).catch(errLog => console.error("Gagal mengirim log aktivitas, namun ujian tetap dilanjutkan:", errLog));
            // =================================================================

            // Langkah B: Tampilkan Soal dan Buka Halaman Ujian (Kode Asli Anda)
            parseTeksMenjadiSoal(res.content);
            document.getElementById('section-identitas').classList.remove('page-active');
            document.getElementById('section-ujian').classList.add('page-active');
            sedangUjian = true; 
            mulaiHitungMundur(menitUjian); // Jalankan countdown dinamis per baris

        } else {
            alert("Gagal memuat dokumen soal.");
            document.getElementById('btn-lanjut').innerText = "Mulai Ujian";
            document.getElementById('btn-lanjut').disabled = false;
        }
    })
    .catch(err => {
        alert("Terjadi kesalahan jaringan saat memuat soal.");
        document.getElementById('btn-lanjut').innerText = "Mulai Ujian";
        document.getElementById('btn-lanjut').disabled = false;
        console.error(err);
    });
}


// 5. PARSER SOAL VISUAL - LENGKAP DENGAN DETEKSI GAMBAR OTOMATIS (FIX)
function parseTeksMenjadiSoal(teksPenuh) {
    const containerBox = document.getElementById('box-soal-cbt');
    containerBox.innerHTML = ""; 
    kunciJawabanAsli = [];
    
    // Pecah dokumen berdasarkan penanda [Soal 1], [Soal 2], dst
    const islands = teksPenuh.split(/\[Soal\s*\d+\]/i);
    let nomorUrut = 1;

    for (let i = 1; i < islands.length; i++) {
        let teksBlok = islands[i].trim();
        if (!teksBlok) continue;

        // Mengambil index dari hasil match agar murni berupa teks sebelum di-trim
        let barisKunci = teksBlok.match(/Kunci[\s\xA0]*:[\s\xA0]*(.*)/i);
        let kunciBersih = (barisKunci && barisKunci[1]) ? barisKunci[1].trim() : "";
        kunciJawabanAsli.push(kunciBersih);

        let barisBarisRaw = teksBlok.split("\n").map(b => b.trim()).filter(b => b !== "");
        let kalimatPertanyaanArr = []; 
        let daftarOpsi = [];

        for (let j = 0; j < barisBarisRaw.length; j++) {
            let barisAktif = barisBarisRaw[j];
            if (/^Kunci/i.test(barisAktif) || barisAktif.toUpperCase().includes("KUNCI")) continue; 
            
            let opsiMatch = barisAktif.match(/^([A-E])\s*[\)[\]|\.]\s*(.*)/i);
            if (opsiMatch) {
                daftarOpsi.push({ huruf: opsiMatch[1].toUpperCase(), teksOpsi: opsiMatch[2] });
            } else {
                kalimatPertanyaanArr.push(barisAktif);
            }
        }

        // --- LOGIKA UTAMA DETEKSI FORMAT GAMBAR ---
        let teksPertanyaanPenuh = kalimatPertanyaanArr.join("<br>");
        
        // Deteksi pola [GAMBAR:https://...] atau [GAMBAR:http://...]
        const regexGambar = /\[GAMBAR:\s*(https?:\/\/[^\s\]]+)\s*\]/gi;
        
        // Ubah teks pola [GAMBAR:URL] menjadi elemen tag HTML <img> asli agar foto muncul
        teksPertanyaanPenuh = teksPertanyaanPenuh.replace(regexGambar, function(match, urlGambar) {
            return `<br><img src="${urlGambar}" style="width:100%; max-width:400px; height:auto; border-radius:10px; margin:10px 0; border:1px solid #e2e8f0; display:block;" alt="Gambar Soal"><br>`;
        });

        let htmlSoal = `<div class="soal-card"><div class="soal-teks">${nomorUrut}. ${teksPertanyaanPenuh}</div><div class="pilihan-container">`;
        if (daftarOpsi.length === 0) {
            htmlSoal += `<textarea name="soal_${nomorUrut}" data-tipe="essay" rows="4" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;" placeholder="Ketik jawaban esai..."></textarea>`;
        } else {
            daftarOpsi.forEach(opsi => {
                htmlSoal += `<label class="pilihan-item"><input type="radio" name="soal_${nomorUrut}" data-tipe="pg" value="${opsi.huruf}"> <span>${opsi.huruf}. ${opsi.teksOpsi}</span></label>`;
            });
        }
        htmlSoal += `</div></div>`;
        containerBox.innerHTML += htmlSoal;
        nomorUrut++;
    }
}


// 6. ENGINE JAM DIGITAL HITUNG MUNDUR
function mulaiHitungMundur(durasiMenit) {
    const timerDisplay = document.getElementById('countdown-timer');
    timerDisplay.style.display = 'block';
    let waktuDetik = durasiMenit * 60;

    timerInterval = setInterval(() => {
        let menit = Math.floor(waktuDetik / 60);
        let detik = waktuDetik % 60;

        menit = menit < 10 ? "0" + menit : menit;
        detik = detik < 10 ? "0" + detik : detik;

        timerDisplay.innerText = "Sisa Waktu: " + menit + ":" + detik;

        if (waktuDetik <= 0) {
            clearInterval(timerInterval);
            sedangUjian = false;
            alert("Waktu habis! Jawaban Anda akan otomatis dikirimkan ke server.");
            kirimJawabanOtomatisSelesai(); 
        }
        waktuDetik--;
    }, 1000);
}

// 7. DETEKSI ANTI-CURANG PINDAH TAB (SUDAH TERINTEGRASI KE SHEET LOG)
// 7. DETEKSI ANTI-CURANG PINDAH TAB (VERSI FORM-DATA AMAN NO-CORS)
document.addEventListener("visibilitychange", () => {
  
  // Ganti kode di dalam document.addEventListener("visibilitychange") menjadi format JSON:
if (document.hidden && sedangUjian) {
  jumlahPelanggaran++; 
  const inputId = document.getElementById('nisn').value.trim(); 
  if (inputId) {
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "update_kecurangan_realtime",
        idSiswa: inputId,
        pelanggaran: jumlahPelanggaran
      })
    })
    .then(() => console.log("Data kecurangan berhasil dikirim ke server: " + jumlahPelanggaran))
    .catch(err => console.error("Gagal mengirim data kecurangan:", err));
  }
  alert(`PERINGATAN KECURANGAN!\nAnda terdeteksi meninggalkan halaman ujian sebanyak ${jumlahPelanggaran} kali. Aktivitas ini dilaporkan ke guru!`);
}


});
// 8. CEK VALIDASI PENGISIAN SOAL
function hitungDanKirimNilai() {
    let totalSoal = kunciJawabanAsli.length;
    for (let i = 0; i < totalSoal; i++) {
        let nomorSoal = i + 1;
        let radioChecked = document.querySelector(`input[name="soal_${nomorSoal}"]:checked`);
        let elemenUraian = document.querySelector(`textarea[name="soal_${nomorSoal}"]`);
        let apakahIniSoalPG = document.querySelector(`input[type="radio"][name="soal_${nomorSoal}"]`);

        if (apakahIniSoalPG && !radioChecked) return alert(`Soal nomor ${nomorSoal} belum diisi!`);
        if (elemenUraian && elemenUraian.value.trim() === "") return alert(`Soal nomor ${nomorSoal} belum diisi!`);
    }

    if (!confirm("Apakah Anda yakin ingin menyelesaikan ujian?")) return;
    kirimJawabanOtomatisSelesai();
}

function kirimJawabanOtomatisSelesai() {
    clearInterval(timerInterval); 
    sedangUjian = false; 
    
    let benarPG = 0; 
    let totalPG = 0; 
    let dataSoalUraian = [];
    let totalSoal = kunciJawabanAsli.length;

    for (let i = 0; i < totalSoal; i++) {
        let nomorSoal = i + 1;
        let radioChecked = document.querySelector(`input[name="soal_${nomorSoal}"]:checked`);
        let elemenUraian = document.querySelector(`textarea[name="soal_${nomorSoal}"]`);

        // KOREKSI PG: Menghitung total soal PG dan mencocokkan huruf kunci jawaban
        if (document.querySelector(`input[type="radio"][name="soal_${nomorSoal}"]`)) {
            totalPG++; 
            if (radioChecked && kunciJawabanAsli[i]) {
                if (radioChecked.value.trim().toUpperCase() === kunciJawabanAsli[i].trim().toUpperCase()) {
                    benarPG++;
                }
            }
        } 
        // KOREKSI ESAI: Mengumpulkan jawaban uraian siswa untuk dicocokkan kata kuncinya
        else if (elemenUraian) {
            let elemenCard = elemenUraian.closest('.soal-card');
            let teksPertanyaan = "Soal Uraian " + nomorSoal;
            if (elemenCard && elemenCard.querySelector('.soal-teks')) {
                teksPertanyaan = elemenCard.querySelector('.soal-teks').innerText.replace(/^\d+\.\s*/, "");
            }
            dataSoalUraian.push({ 
                pertanyaan: teksPertanyaan, 
                kunciPanduan: kunciJawabanAsli[i], 
                jawabanSiswa: elemenUraian.value.trim() 
            });
        }
    }

    let nilaiMurniPG = totalPG > 0 ? (benarPG / totalPG) * 100 : 0;
    document.getElementById('box-soal-cbt').innerHTML = "<div style='text-align:center; padding:40px;'><b>Sistem sedang mengunci dan mengirim nilai Anda ke spreadsheet...</b></div>";

    // MENGIRIM DATA UTUH KE SERVER SPREADSHEET
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "prosesNilaiDanEssayAI", 
            idSiswa: document.getElementById('nisn').value.trim(),
            kolomLatihan: infoSiswa.kolomLatihan,
            nilaiPG: nilaiMurniPG,
            dataEssay: dataSoalUraian,
            pelanggaran: jumlahPelanggaran 
        })
    })
    .then(response => response.json())
    .then(res => {
        if (res.status === "success") {
            alert(`Asesmen Selesai!\n\nNilai PG: ${res.nilaiPG}\nNilai Esai (Kata Kunci): ${res.nilaiEssay}\nNilai Total Gabungan: ${res.nilaiTotal}\nTotal Kecurangan: ${jumlahPelanggaran} kali.`);
            location.reload();
        } else {
            alert("Gagal memproses nilai ke spreadsheet server.");
            document.getElementById('box-soal-cbt').innerHTML = "<h3>Terjadi kesalahan server. Silakan hubungi pengawas.</h3>";
        }
    })

    .catch(err => {
        alert("Koneksi internet terputus saat mengirim nilai!");
        document.getElementById('box-soal-cbt').innerHTML = "<h3>Koneksi gagal. Jangan tutup halaman ini, periksa Wi-Fi Anda!</h3>";
    });
}
</script>
</body>
</html>
